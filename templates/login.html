<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherSphere — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a0f1e;
    --deep: #0d1530;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --blue: #3b82f6;
    --cyan: #06b6d4;
    --text: #e2e8f0;
    --muted: #64748b;
    --error: #f87171;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background */
  .bg-orbs {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .orb {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15;
    animation: drift 12s ease-in-out infinite;
  }
  .orb-1 { width: 500px; height: 500px; background: #1d4ed8; top: -10%; left: -10%; animation-delay: 0s; }
  .orb-2 { width: 400px; height: 400px; background: #0891b2; bottom: -10%; right: -5%; animation-delay: -4s; }
  .orb-3 { width: 300px; height: 300px; background: #7c3aed; top: 40%; left: 60%; animation-delay: -8s; }

  @keyframes drift {
    0%, 100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(30px,-20px) scale(1.05); }
    66% { transform: translate(-20px,30px) scale(0.95); }
  }

  /* Grid overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: 0;
  }

  .login-wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px;
    padding: 24px;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    text-align: center; margin-bottom: 40px;
  }

  .logo-icon {
    width: 64px; height: 64px; margin: 0 auto 16px;
    background: linear-gradient(135deg, var(--blue), var(--cyan));
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    box-shadow: 0 0 40px rgba(59,130,246,0.4);
    animation: pulse-glow 3s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 40px rgba(59,130,246,0.4); }
    50% { box-shadow: 0 0 60px rgba(59,130,246,0.7), 0 0 100px rgba(6,182,212,0.3); }
  }

  .logo h1 {
    font-family: 'Space Mono', monospace;
    font-size: 24px; font-weight: 700;
    background: linear-gradient(135deg, #93c5fd, #67e8f9);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .logo p { color: var(--muted); font-size: 13px; margin-top: 4px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    backdrop-filter: blur(20px);
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }

  .card h2 {
    font-size: 20px; font-weight: 600; color: var(--text);
    margin-bottom: 8px;
  }
  .card p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

  .field { margin-bottom: 18px; }
  .field label {
    display: block; font-size: 12px; font-weight: 500;
    color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .input-wrap { position: relative; }
  .input-wrap .icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 16px; opacity: 0.5;
  }

  .field input {
    width: 100%; padding: 12px 14px 12px 40px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text); font-family: 'Outfit', sans-serif; font-size: 15px;
    outline: none; transition: all 0.2s;
  }
  .field input:focus {
    border-color: var(--blue);
    background: rgba(59,130,246,0.08);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  .field input::placeholder { color: var(--muted); }

  .btn-login {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--blue), #1d4ed8);
    color: #fff; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600;
    border: none; border-radius: 10px; cursor: pointer;
    transition: all 0.2s; margin-top: 8px;
    box-shadow: 0 4px 20px rgba(59,130,246,0.4);
  }
  .btn-login:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(59,130,246,0.55);
  }
  .btn-login:active { transform: translateY(0); }

  .error-box {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 10px; padding: 12px 16px;
    color: var(--error); font-size: 13px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }

  .footer-note {
    text-align: center; margin-top: 24px;
    color: var(--muted); font-size: 12px;
    font-family: 'Space Mono', monospace;
  }
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="login-wrap">
  <div class="logo">
    <div class="logo-icon">🌤</div>
    <h1>WeatherSphere</h1>
    <p>Real-time weather intelligence platform</p>
  </div>

  <div class="card">
    <h2>Welcome back</h2>
    <p>Sign in to your account to continue</p>

    {% if error %}
    <div class="error-box">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="field">
        <label>Username</label>
        <div class="input-wrap">
          <span class="icon">👤</span>
          <input type="text" name="username" placeholder="Enter your username" required autofocus>
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input type="password" name="password" placeholder="Enter your password" required>
        </div>
      </div>
      <button type="submit" class="btn-login">Sign In →</button>
    </form>
  </div>

  <div class="footer-note">WeatherSphere v1.0 · Secure Login</div>
</div>
</body>
</html>
